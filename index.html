<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticker Haven</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
color:#333;
}

.header{
background:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.category{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.category:hover{
transform:translateY(-5px);
}

.sticker-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:20px;
margin-top:30px;
}

.sticker{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.sticker span{
font-size:60px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#ff6b6b;
color:white;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#ff3b3b;
}
</style>
</head>

<body>

<div class="header">🦄 Sticker Haven</div>

<div class="container">

<h2 style="text-align:center;color:white">Choose Category</h2>

<div class="categories">

<div class="category" onclick="showCategory('animals')">
🐾
<h3>Animals</h3>
</div>

<div class="category" onclick="showCategory('food')">
🍔
<h3>Food</h3>
</div>

<div class="category" onclick="showCategory('space')">
🚀
<h3>Space</h3>
</div>

<div class="category" onclick="showCategory('music')">
🎸
<h3>Music</h3>
</div>

</div>

<div class="sticker-grid" id="sticker-grid"></div>

</div>

<script>

const stickers={

animals:[
{name:"Cat",emoji:"🐱",price:3},
{name:"Dog",emoji:"🐶",price:3},
{name:"Panda",emoji:"🐼",price:3},
{name:"Fox",emoji:"🦊",price:3},
{name:"Lion",emoji:"🦁",price:3},
{name:"Tiger",emoji:"🐯",price:3},
{name:"Monkey",emoji:"🐵",price:3},
{name:"Penguin",emoji:"🐧",price:3},
{name:"Owl",emoji:"🦉",price:3},
{name:"Dinosaur",emoji:"🦕",price:3}
],

food:[
{name:"Pizza",emoji:"🍕",price:2},
{name:"Burger",emoji:"🍔",price:2},
{name:"Fries",emoji:"🍟",price:2},
{name:"Ice Cream",emoji:"🍦",price:2},
{name:"Donut",emoji:"🍩",price:2},
{name:"Cake",emoji:"🍰",price:2},
{name:"Taco",emoji:"🌮",price:2},
{name:"Hotdog",emoji:"🌭",price:2},
{name:"Sushi",emoji:"🍣",price:2},
{name:"Popcorn",emoji:"🍿",price:2}
],

space:[
{name:"Rocket",emoji:"🚀",price:4},
{name:"Alien",emoji:"👽",price:4},
{name:"Planet",emoji:"🪐",price:4},
{name:"Earth",emoji:"🌍",price:4},
{name:"Star",emoji:"⭐",price:4},
{name:"Galaxy",emoji:"🌌",price:4},
{name:"Moon",emoji:"🌙",price:4},
{name:"Astronaut",emoji:"👨‍🚀",price:4},
{name:"Comet",emoji:"☄️",price:4},
{name:"Sparkle",emoji:"✨",price:4}
],

music:[
{name:"Guitar",emoji:"🎸",price:3},
{name:"Headphones",emoji:"🎧",price:3},
{name:"Microphone",emoji:"🎤",price:3},
{name:"Drums",emoji:"🥁",price:3},
{name:"Music Note",emoji:"🎵",price:3},
{name:"Trumpet",emoji:"🎺",price:3},
{name:"Saxophone",emoji:"🎷",price:3},
{name:"Piano",emoji:"🎹",price:3},
{name:"DJ",emoji:"🎚️",price:3},
{name:"CD",emoji:"💿",price:3}
]

};

function showCategory(category){

const grid=document.getElementById("sticker-grid");

grid.innerHTML="";

stickers[category].forEach(s=>{

grid.innerHTML+=`
<div class="sticker">
<span>${s.emoji}</span>
<h3>${s.name}</h3>
<p>$${s.price}</p>
<button onclick="alert('Added ${s.name} to cart')">
Add to Cart
</button>
</div>
`;

});

}

showCategory("animals");

</script>

</body>
</html>
